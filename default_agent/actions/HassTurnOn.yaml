---
HassTurnOn:
  match_targets: true
  actions:
    - choose:
        - conditions:
            - condition: "{{ domain == 'cover' }}"
          sequence:
            - action: "cover.open_cover"
              target:
                entity_id: "{{ target_entity_ids }}"
      default:
        - action: "homeassistant.turn_on"
          target:
            entity_id: "{{ target_entity_ids }}"
  slots: {}
